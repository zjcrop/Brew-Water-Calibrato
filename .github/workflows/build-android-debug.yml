name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - index.html
      - assets/**
      - package.json
      - package-lock.json
      - capacitor.config.json
      - scripts/**
      - android/**
      - .github/workflows/build-android-debug.yml

permissions:
  contents: read

concurrency:
  group: android-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.16.0'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Verify required files
        shell: bash
        run: |
          set -euxo pipefail
          test -s index.html
          test -d android
          test -f android/gradlew
          test -f android/gradle/wrapper/gradle-wrapper.properties
          echo "Required files detected."

      - name: Pin npm and verify registry
        shell: bash
        run: |
          set -euxo pipefail
          npm install --global npm@10.9.2
          npm --version
          npm config set registry https://registry.npmjs.org/
          npm config get registry

      - name: Install npm dependencies
        env:
          npm_config_registry: https://registry.npmjs.org/
        run: npm ci --no-audit --no-fund --prefer-online

      - name: Prepare local web assets
        run: npm run prepare:web

      - name: Sync Capacitor web assets
        run: npx cap sync android

      - name: Install Android SDK 36
        shell: bash
        run: |
          set -euxo pipefail
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          command -v sdkmanager
          sdkmanager --version
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Set Android app version
        shell: bash
        run: |
          set -euxo pipefail
          sed -i 's/versionCode 1/versionCode 20400/' android/app/build.gradle
          sed -i 's/versionName "1.0"/versionName "2.4.0"/' android/app/build.gradle
          grep -nE 'versionCode|versionName' android/app/build.gradle

      - name: Build debug APK
        working-directory: android
        shell: bash
        run: |
          set -euxo pipefail
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          bash ./gradlew --version
          bash ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare APK artifact
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            dist/Brew-Water-Calibrato-v2.4.0-debug.apk
          sha256sum dist/Brew-Water-Calibrato-v2.4.0-debug.apk \
            > dist/SHA256SUMS.txt
          ls -lh dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: Brew-Water-Calibrato-v2.4.0-debug
          path: dist/
          if-no-files-found: error
          retention-days: 30
