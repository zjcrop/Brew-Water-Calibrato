name: Deploy Brew Water Calibrator to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - index.html
      - assets/**
      - .github/workflows/deploy-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify permanent v2.6.1 source
        shell: bash
        run: |
          set -euxo pipefail
          test -s index.html
          grep -q "CUI_LI_V261_PATCH" index.html
          grep -q "配方2.6.1版" index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html _site/index.html
          if [ -d assets ]; then
            cp -R assets _site/assets
          fi
          touch _site/.nojekyll
          find _site -maxdepth 2 -type f -print

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
