name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - index.html
      - assets/**
      - package.json
      - package-lock.json
      - capacitor.config.json
      - scripts/**
      - android/**
      - .github/workflows/build-android-debug.yml

permissions:
  contents: read

concurrency:
  group: android-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Verify required files
        shell: bash
        run: |
          test -s index.html
          test -d android
          echo "index.html and android project detected."

      - name: Pin npm and verify registry
        shell: bash
        run: |
          npm install --global npm@10.9.2
          npm --version
          npm config set registry https://registry.npmjs.org/
          npm config get registry

      - name: Install npm dependencies
        env:
          npm_config_registry: https://registry.npmjs.org/
        run: npm ci --no-audit --no-fund --prefer-online

      - name: Prepare local web assets
        run: npm run prepare:web

      - name: Sync Capacitor web assets into Android project
        run: npx cap sync android

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set Android app version
        shell: bash
        run: |
          sed -i 's/versionCode 1/versionCode 20400/' android/app/build.gradle
          sed -i 's/versionName "1.0"/versionName "2.4.0"/' android/app/build.gradle

      - name: Build debug APK
        working-directory: android
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare APK artifact
        shell: bash
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/Brew-Water-Calibrato-v2.4.0-debug.apk
          sha256sum dist/Brew-Water-Calibrato-v2.4.0-debug.apk > dist/SHA256SUMS.txt
          ls -lh dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Brew-Water-Calibrato-v2.4.0-debug
          path: dist/
          if-no-files-found: error
          retention-days: 30
